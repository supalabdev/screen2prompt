name: Deploy Widget to CDN

on:
  release:
    types: [published]
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
  CDN_PATH: v1/screen2prompt.js
  DIST_FILE: packages/screen2prompt/dist/cdn/screen2prompt.js
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build & Upload to R2
    runs-on: ubuntu-latest
    environment: Release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CDN bundle
        run: cd packages/screen2prompt && bun run build

      - name: Upload to Cloudflare R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            r2 object put ${{ env.BUCKET_NAME }}/${{ env.CDN_PATH }}
            --file ${{ env.DIST_FILE }}
            --content-type "application/javascript"
            --cache-control "public, max-age=31536000, immutable"
            --remote

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://cdn.screen2prompt.supalab.dev/${{ env.CDN_PATH }}"]}'

      - name: Summary
        run: |
          echo "### Widget deployed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://cdn.screen2prompt.supalab.dev/${{ env.CDN_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
